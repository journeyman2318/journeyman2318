<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Galactic Database</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<style>
/* ---------------------------------------
   GLOBAL LAYOUT + BASE STYLES
--------------------------------------- */

body {
  margin: 0;
  padding: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #05070b;
  color: #e5e7eb;
}

.page {
  max-width: 1200px;
  margin: 0 auto;
  padding: 16px;
  box-sizing: border-box;
}


/* ---------------------------------------
   MAP SECTION
--------------------------------------- */

#map-container {
  width: 100%;
  height: 320px;
  background: radial-gradient(circle at top, #1f2933, #020308);
  border: 1px solid #111827;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #9ca3af;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-size: 0.85rem;
}


/* ---------------------------------------
   SEARCH BAR + SUGGESTIONS
--------------------------------------- */

#search-section {
  margin: 16px 0 24px 0;
  position: relative;
}

#system-search {
  width: 100%;
  padding: 10px 12px;
  font-size: 1rem;
  border-radius: 4px;
  border: 1px solid #374151;
  background: #020617;
  color: #e5e7eb;
  box-sizing: border-box;
}

#search-suggestions {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: #020617;
  border: 1px solid #374151;
  border-top: none;
  max-height: 200px;
  overflow-y: auto;
  display: none;
  z-index: 10;

  /* IMPORTANT: prevent invisible overlay blocking clicks */
  pointer-events: none;
}

.suggestion-item {
  padding: 8px 12px;
  cursor: pointer;
}

.suggestion-item:hover {
  background: #111827;
}


/* ---------------------------------------
   INFO PANELS
--------------------------------------- */

#info-section {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

#system-diagram,
#system-summary {
  border: 1px solid #111827;
  background: #020617;
  padding: 12px 14px;
  box-sizing: border-box;
  min-height: 220px;
}

#system-diagram-title,
#system-summary-title {
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: #9ca3af;
  margin-bottom: 8px;
}


/* ---------------------------------------
   SYSTEM DIAGRAM CANVAS
--------------------------------------- */

#system-diagram-canvas {
  white-space: pre;
  border: 1px dashed #1f2937;
  padding: 12px;
  min-height: 180px;
  color: #4b5563;
  font-size: 0.85rem;
}

#system-diagram-canvas span {
  display: inline-block;
  margin: 0 2px;
}

#system-diagram, #system-diagram-canvas {
  overflow: visible !important;
}


/* ---------------------------------------
   SYSTEM SUMMARY PANEL
--------------------------------------- */

#system-summary-content {
  font-size: 0.95rem;
  line-height: 1.4;
}


/* ---------------------------------------
   OPEN FULL ENTRY BUTTON
--------------------------------------- */

#open-entry-btn {
  margin-top: 12px;
  padding: 8px 12px;
  font-size: 0.9rem;
  border-radius: 4px;
  border: 1px solid #4b5563;
  background: #111827;
  color: #e5e7eb;
  cursor: pointer;
}

#open-entry-btn:hover {
  background: #1f2937;
}


/* ---------------------------------------
   TOOLTIP
--------------------------------------- */

#tooltip {
  position: fixed;
  background: rgba(0, 0, 0, 0.85);
  color: #9fdcff;
  padding: 6px 10px;
  border-radius: 4px;
  font-size: 0.85rem;
  pointer-events: none;
  opacity: 0;
  transform: translateY(-6px);
  transition: opacity 0.15s ease, transform 0.15s ease;
  z-index: 9999999;
  border: 1px solid #1e90ff55;
  box-shadow: 0 0 6px #1e90ff55;
}


/* ---------------------------------------
   RESPONSIVE
--------------------------------------- */

@media (max-width: 800px) {
  #info-section {
    grid-template-columns: 1fr;
  }
}
/*----------------------------------------
    INTERACTIVE MAP
-----------------------------------------*/
#map-frame {
    width: 100%;
    height: 60vh;
    overflow: hidden;   /* critical */
    position: relative;
    background: black;
}


/* This defines the ABSOLUTE size of the map */
#map-viewport {
    width: 800px;
    height: 800px;
    overflow: hidden;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%); /* centers the map */
}


#tempes-map {
    width: 800px;
    height: 800px;
    transform-origin: 50% 50%;
    display: block;
    overflow: visible;
}

.system-node:hover circle {
  stroke: #00eaff;
  stroke-width: 2px;
}

.system-node.selected circle {
  stroke: #00eaff;
  stroke-width: 3px;
  filter: drop-shadow(0 0 4px #00eaff);
}


.corridor-node text {
  pointer-events: visiblePainted;
  cursor: pointer;
}


.corridor-node.selected text {
  fill: #00eaff;
  filter: drop-shadow(0 0 4px #00eaff);
}

.corridor-node text:hover {
  fill: #00eaff;
}


    

</style>
</head>
