<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Oganesson System — Full Database Entry</title>

  <style>
    body {
      background: #0b0e11;
      color: #e5e7eb;
      font-family: "Segoe UI", sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 0;
    }

    .db-entry__header {
      background: #111827;
      padding: 20px;
      border-bottom: 1px solid #1f2937;
    }

    .db-entry__header h1 {
      color: #9fdcff;
      margin: 0 0 10px 0;
    }

    .db-entry__meta p {
      margin: 2px 0;
      color: #cbd5e1;
    }

    .db-entry__content {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    h2 {
      color: #9fdcff;
      border-bottom: 1px solid #1f2937;
      padding-bottom: 4px;
      margin-top: 40px;
    }

    h3 {
      color: #7dd3fc;
      margin-top: 20px;
    }

    ul {
      margin-left: 20px;
    }

    li {
      margin-bottom: 4px;
    }

    .return-button {
      display: inline-block;
      padding: 8px 14px;
      background: #111827;
      border: 1px solid #4b5563;
      border-radius: 4px;
      color: #e5e7eb;
      text-decoration: none;
      font-size: 0.9rem;
      margin: 20px auto 10px auto;
    }

    .db-divider {
      border: 0;
      border-top: 1px solid #1f2937;
      margin: 1.5rem 0;
    }
