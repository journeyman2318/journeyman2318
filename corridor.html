<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Corridor Registry</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #05070b;
      color: #e5e7eb;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
      box-sizing: border-box;
    }

    h1 {
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-size: 1rem;
      color: #9ca3af;
      margin-bottom: 24px;
      text-align: center;
    }

    .corridor-block {
      border: 1px solid #111827;
      background: #020617;
      padding: 16px;
      margin-bottom: 20px;
      border-radius: 4px;
    }

    .corridor-title {
      font-size: 1.1rem;
      margin-bottom: 8px;
      color: #9fdcff;
    }

    .corridor-section {
      margin: 6px 0 12px 0;
    }

    .layout-box {
      white-space: pre;
      border: 1px dashed #1f2937;
      padding: 10px;
      margin-top: 8px;
      color: #4b5563;
      font-size: 0.85rem;
    }

  </style>
</head>

<body>
  <div class="page">
    <h1>Corridor Registry — Full Data Dump</h1>
<div style="text-align:center; margin-bottom:20px;">
  <a href="galactic-database.html"
     style="
       display:inline-block;
       padding:8px 14px;
       background:#111827;
       border:1px solid #4b5563;
       border-radius:4px;
       color:#e5e7eb;
       text-decoration:none;
       font-size:0.9rem;
     ">
    ← Back to Galactic Database
  </a>
</div>


    <div id="corridor-container">
      <!-- JS will populate corridor entries here -->
    </div>
  </div>

  <script src="systems.js"></script>
  <script>
    const container = document.getElementById("corridor-container");

    // Extract only corridor entries
    const corridors = Object.values(systems).filter(entry => entry.type === "corridor");

    corridors.forEach(c => {
      const block = document.createElement("div");
      block.className = "corridor-block";

      block.innerHTML = `
        <div class="corridor-title">${c.name}</div>

        <div class="corridor-section">
          <strong>Region:</strong> ${c.summary.region}
        </div>

        <div class="corridor-section">
          <strong>Connects:</strong> ${c.connects.join(" → ")}
        </div>

        <div class="corridor-section">
          <strong>Notes:</strong>
          <ul>
            ${c.summary.notes.map(n => `<li>${n}</li>`).join("")}
          </ul>
        </div>

        <div class="corridor-section">
          <strong>Layout:</strong>
          <div class="layout-box">${c.layout}</div>
        </div>
      `;

      container.appendChild(block);
    });
  </script>
</body>
</html>
