<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OVERRIDE IN PROGRESS — GERNLY, EDITH M.</title>

  <style>
    body {
      background: #000000;
      color: #ff0000;
      font-family: "Segoe UI", sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 60px;
      text-align: center;
    }

    h1 {
      color: #ff0000;
      font-size: 3rem;
      margin-bottom: 20px;
    }

    .message {
      font-size: 1.8rem;
      margin-top: 40px;
    }

    .blink {
      animation: blink 1.2s infinite;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.2; }
      100% { opacity: 1; }
    }
  </style>
</head>

<body>

  <h1>⛔ OVERRIDE ENGAGED</h1>

  <p class="message">
    Your repeated attempts to access restricted materials have been noted.
  </p>

  <p class="message">
    Please remain where you are.
  </p>

  <p class="message blink">
    <em>She is on her way.</em>
  </p>

</body>
</html>
